version: '3.8'

services:
  downloadarr:
    build: .
    container_name: downloadarr
    ports:
      -"8000:8000"
    volumes:
      - ./music:/app/music
    environment:
      - MUSIC_DIR=/app/music
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
