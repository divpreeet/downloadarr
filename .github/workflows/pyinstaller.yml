name: Build binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux
          - os: windows-latest
            arch: windows
          - os: macos-13
            arch: mac-intel
          - os: macos-14
            arch: mac-arm
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ffmpeg install per OS
      - name: Install ffmpeg (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          else
            brew install ffmpeg
          fi

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ffmpeg -y

      - name: Install Python deps
        shell: bash
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Python deps (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        if: runner.os != 'Windows'
        run: pyinstaller --onefile --name downloadarr main.py

      - name: Build with PyInstaller (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --name downloadarr main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloadarr-${{ matrix.arch }}-${{ github.ref_name }}
          path: dist/downloadarr*